<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clinic Receptionist</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Navigation -->
        <nav class="top-nav">
            <div class="logo">
                <span class="icon">🏥</span>
                <span class="text" id="app-title">SmartClinic AI</span>
            </div>
            <div class="nav-actions">
                <select id="lang-select" class="lang-switcher">
                    <option value="en">English</option>
                    <option value="hi">हिंदी (Hindi)</option>
                    <option value="mr">मराठी (Marathi)</option>
                </select>
                <a href="admin.html" class="nav-btn primary" id="nav-dashboard">Dashboard &rarr;</a>
            </div>
        </nav>

        <!-- Chat Container -->
        <main class="chat-wrapper">
            <div class="chat-container glass-panel">
                <div class="chat-header">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Receptionist&backgroundColor=transparent" alt="AI Agent" class="agent-avatar">
                    <div class="agent-info">
                        <h2 id="chat-header">AI Receptionist</h2>
                        <span class="status"><span class="dot"></span> <span id="chat-status">Online and ready to help</span></span>
                    </div>
                </div>
                
                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be injected here by JS -->
                </div>

                <div class="chat-input-area">
                    <form id="chat-form">
                        <button type="button" id="mic-btn" class="icon-btn mic-btn" title="Click to speak">🎤</button>
                        <input type="text" id="user-input" placeholder="Type or tap 🎤 to speak..." autocomplete="off" />
                        <button type="submit" id="send-btn" class="icon-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </form>
                    <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:0.85rem;color:var(--text-secondary);padding-left:4px;">
                        <input type="checkbox" id="voice-toggle" checked style="accent-color:var(--accent);width:16px;height:16px;">
                        <label for="voice-toggle" id="chat-speak">🔊 AI speaks responses</label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="translations.js"></script>
    <script src="chat.js"></script>
    <script src="voice.js"></script>
    <script>
        // Language Switch Logic Integration
        const langSelect = document.getElementById('lang-select');
        langSelect.value = localStorage.getItem('clinic_lang') || 'en';
        
        function updateUILT() {
            const lang = langSelect.value;
            localStorage.setItem('clinic_lang', lang);
            const t = translations[lang];
            
            document.getElementById('app-title').textContent = t.app_title;
            document.getElementById('nav-dashboard').innerHTML = t.nav_dashboard + ' &rarr;';
            document.getElementById('chat-header').textContent = t.chat_header;
            document.getElementById('chat-status').textContent = t.chat_status;
            document.getElementById('user-input').placeholder = t.chat_placeholder;
            document.getElementById('chat-speak').textContent = t.chat_speak;
        }

        langSelect.addEventListener('change', updateUILT);
        updateUILT();
    </script>
</body>
</html>
